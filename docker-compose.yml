version: "3.9"

services:
  # ─── Ollama (local Mistral-7B) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: codesense-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support — comment out if no NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ─── CodeSense Backend (FastAPI) ───────────────────────────────────────────
  backend:
    build: .
    container_name: codesense-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral:7b-instruct
      - EXECUTION_TIMEOUT=5
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Ollama Model Pull (one-time init) ─────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: codesense-model-pull
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 5 && ollama pull mistral:7b-instruct"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

volumes:
  ollama_data:
